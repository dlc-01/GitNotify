version: "3.9"

services:
  zookeeper:
    image: confluentinc/cp-zookeeper:7.6.0
    environment:
      ZOOKEEPER_CLIENT_PORT: 2181
    healthcheck:
      test: ["CMD-SHELL", "echo ruok | nc localhost 2181"]
      interval: 5s
      timeout: 5s
      retries: 5

  kafka:
    image: confluentinc/cp-kafka:7.6.0
    depends_on:
      zookeeper:
        condition: service_healthy
    environment:
      KAFKA_BROKER_ID: 1
      KAFKA_ZOOKEEPER_CONNECT: zookeeper:2181
      KAFKA_ADVERTISED_LISTENERS: PLAINTEXT://kafka:9092
      KAFKA_OFFSETS_TOPIC_REPLICATION_FACTOR: 1
      KAFKA_AUTO_CREATE_TOPICS_ENABLE: "true"
    healthcheck:
      test: ["CMD-SHELL", "kafka-broker-api-versions --bootstrap-server localhost:9092"]
      interval: 10s
      timeout: 10s
      retries: 5

  postgres-bot:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: gitnotify
      POSTGRES_PASSWORD: gitnotify
      POSTGRES_DB: gitnotify_bot
    volumes:
      - pgdata-bot:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U gitnotify -d gitnotify_bot"]
      interval: 5s
      timeout: 5s
      retries: 5

  postgres-notifier:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: gitnotify
      POSTGRES_PASSWORD: gitnotify
      POSTGRES_DB: gitnotify_notifier
    volumes:
      - pgdata-notifier:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U gitnotify -d gitnotify_notifier"]
      interval: 5s
      timeout: 5s
      retries: 5

  bot:
    build:
      context: .
      dockerfile: cmd/bot/Dockerfile
    env_file:
      - .env.bot
    depends_on:
      postgres-bot:
        condition: service_healthy
      kafka:
        condition: service_healthy
    restart: unless-stopped

  webhook:
    build:
      context: .
      dockerfile: cmd/webhook/Dockerfile
    env_file:
      - .env.webhook
    ports:
      - "8080:8080"
    depends_on:
      kafka:
        condition: service_healthy
    restart: unless-stopped

  notifier:
    build:
      context: .
      dockerfile: cmd/notifier/Dockerfile
    env_file:
      - .env.notifier
    depends_on:
      postgres-notifier:
        condition: service_healthy
      kafka:
        condition: service_healthy
    restart: unless-stopped

volumes:
  pgdata-bot:
  pgdata-notifier: