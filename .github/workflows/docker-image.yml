name: deploy

on:
  push:
    branches:
      - master

jobs:
  deploy:
    runs-on: ubuntu-latest
    permissions:
      contents: read

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Login to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Build and push bot image
        uses: docker/build-push-action@v5
        with:
          context: .
          file: ./cmd/bot/Dockerfile
          push: true
          tags: dlc01/linktracker-bot:${{ github.sha }}

      - name: Build and push notifier image
        uses: docker/build-push-action@v5
        with:
          context: .
          file: ./cmd/notifier/Dockerfile
          push: true
          tags: dlc01/linktracker-notifier:${{ github.sha }}

      - name: Build and push poller image
        uses: docker/build-push-action@v5
        with:
          context: .
          file: ./cmd/poller/Dockerfile
          push: true
          tags: dlc01/linktracker-poller:${{ github.sha }}

      - name: Deploy on server
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.SERVER_HOST }}
          username: ${{ secrets.SERVER_USER }}
          key: ${{ secrets.SERVER_SSH_KEY }}
          script: |
            set -e
            cd /opt/linktracker
            printf 'IMAGE_TAG=%s\n' '${{ github.sha }}' > .env.deploy
            docker compose -f docker-compose.prod.yml --env-file .env.deploy pull
            docker compose -f docker-compose.prod.yml --env-file .env.deploy up -d
            docker image prune -f
